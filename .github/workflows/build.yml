name: Build apps

on:
  push:
    branches: [main]   # fires on direct pushes AND when a PR is merged into main
  workflow_dispatch:    # allow manual runs from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: MyCoolApp-macos
            path: dist/MyCoolApp
          - os: windows-latest
            artifact: MyCoolApp-windows
            path: dist/MyCoolApp.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --noconfirm MyCoolApp.spec

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release and upload assets
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for release
        run: |
          mkdir release
          cp artifacts/MyCoolApp-macos/MyCoolApp   release/MyCoolApp-macos
          cp artifacts/MyCoolApp-windows/MyCoolApp.exe release/MyCoolApp-windows.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: release/*
