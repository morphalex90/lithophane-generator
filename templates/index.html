<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pet Cemetery Lithophane</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/app.js" defer></script>
</head>
<body>
    <main class="card">
        <h1>Pet Cemetery Lithophane</h1>
        <p class="subtitle">Upload one or more photos to turn them into lithophanes.</p>

        <form id="upload_form">
            <label class="file-field" for="file_input">
                <span class="file-label">Choose images</span>
                <input type="file" id="file_input" name="files" accept="image/*" multiple>
                <span id="file_summary" class="file-summary">No files selected</span>
            </label>

            <fieldset class="shape-field">
                <legend>Shape</legend>
                <div class="segmented" role="group" aria-label="Lithophane shape">
                    <label class="segment">
                        <input type="radio" name="shape" value="flat" checked>
                        <span>Flat</span>
                    </label>
                    <label class="segment">
                        <input type="radio" name="shape" value="cylinder">
                        <span>Cylinder</span>
                    </label>
                    <label class="segment">
                        <input type="radio" name="shape" value="both">
                        <span>Both</span>
                    </label>
                </div>
            </fieldset>

            <button type="submit" id="submit_btn" disabled>
                <span class="btn-text">Generate lithophanes</span>
                <span class="spinner" aria-hidden="true"></span>
            </button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite" hidden></div>

        <section id="result_section" hidden>
            <h2>Your lithophanes</h2>
            <ul id="result_list" class="result-list"></ul>
        </section>
    </main>

    {% if live_reload %}
    <script src="/static/livereload.js" defer></script>
    {% endif %}
</body>
</html>
